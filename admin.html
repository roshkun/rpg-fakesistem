<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoftMed Solutions - Painel Administrativo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .config-bar {
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .config-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
        }

        .config-item select, .config-item input {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            background: white;
            font-size: 0.9rem;
            width: 400px;
        }

        .status {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .status.connected {
            background: #28a745;
        }

        .status.error {
            background: #dc3545;
        }

        .status.loading {
            background: #ffc107;
            color: #333;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
        }

        .tab-content {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: #28a745;
            color: white;
        }

        .btn-primary:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .table-container {
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f8f9fa;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .edit-btn, .delete-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 2px;
        }

        .edit-btn {
            background: #ffc107;
            color: #333;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            background: #28a745;
        }

        .message.error {
            background: #dc3545;
        }

        .message.info {
            background: #17a2b8;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ Painel Administrativo</h1>
            <p>Gerencie médicos, legistas, pacientes e falecidos</p>
        </div>

        <div class="config-bar">
            <div class="config-item">
                <label>📋 Sistema:</label>
                <select id="systemMode">
                    <option value="hospitalar">Sistema Hospitalar</option>
                    <option value="funeraria">Sistema Funerária</option>
                </select>
            </div>
            <div class="config-item">
                <label>🔗 API URL:</label>
                <input type="text" id="apiUrl" value="https://script.google.com/macros/s/AKfycbwUTIt8nDgv3U8RaqSBX2ROi4DdPqpbobpmT6kqkX1K-IOHSAQsgD7P6Tq6G_FQsT_E/exec" style="width: 450px;">
            </div>
            <div id="apiStatus" class="status loading">🔄 Verificando...</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="doctors">👨‍⚕️ Médicos / Legistas</button>
            <button class="tab-btn" data-tab="patients">👥 Pacientes / Falecidos</button>
        </div>

        <!-- Aba de Médicos -->
        <div id="doctors-tab" class="tab-content active">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="openAddModal('doctor')">+ Novo Profissional</button>
                <button class="btn btn-secondary" onclick="refreshData()">🔄 Atualizar</button>
            </div>
            <div class="table-container">
                <table id="doctors-table">
                    <thead id="doctors-header"></thead>
                    <tbody id="doctors-body"><tr><td colspan="10" style="text-align:center">Carregando...<br><div class="spinner" style="width:30px;height:30px"></div></td></tr></tbody>
                </table>
            </div>
        </div>

        <!-- Aba de Pacientes -->
        <div id="patients-tab" class="tab-content">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="openAddModal('patient')">+ Novo Paciente</button>
                <button class="btn btn-secondary" onclick="refreshData()">🔄 Atualizar</button>
            </div>
            <div class="table-container">
                <table id="patients-table">
                    <thead id="patients-header"></thead>
                    <tbody id="patients-body">:<td colspan="10" style="text-align:center">Carregando...<br><div class="spinner" style="width:30px;height:30px"></div></td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal para Adicionar/Editar -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Adicionar Registro</h2>
            <form id="editForm" onsubmit="saveRecord(event)">
                <div id="formFields"></div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">💾 Salvar</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Configuração
        let currentMode = 'hospitalar';
        let doctorsData = [];
        let patientsData = [];
        let doctorsHeaders = [];
        let patientsHeaders = [];
        let editingId = null;
        let editingType = null;

        // IDs das abas para CSV direto (fallback)
        const SHEET_ID = '2PACX-1vSa0YBbnJctwW1n6htVZIJ7OAuP8kBnk96XaUDM6BVM2K_iVwgwSKQzOYNDT3XfTvtQeG32AcCCr1eN';
        const GIDS = {
            hospitalar: { doctors: 0, patients: 764843484 },
            funeraria: { doctors: 991544728, patients: 694307237 }
        };

        function showMessage(message, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = message;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 3000);
        }

        // Chamar a API
        async function callAPI(action, type, data = null, id = null) {
            const apiUrl = document.getElementById('apiUrl').value;
            if (!apiUrl) {
                showMessage('Configure a URL da API', 'error');
                return null;
            }

            let url = `${apiUrl}?action=${action}&mode=${currentMode}&type=${type}`;
            if (id) url += `&id=${id}`;
            
            if (data) {
                url += `&data=${encodeURIComponent(JSON.stringify(data))}`;
            }
            
            try {
                const response = await fetch(url);
                const result = await response.json();
                return result;
            } catch (error) {
                console.error('Erro na API:', error);
                return { success: false, error: error.message };
            }
        }

        // Carregar dados via API
        async function loadDataFromAPI() {
            const statusDiv = document.getElementById('apiStatus');
            statusDiv.className = 'status loading';
            statusDiv.innerHTML = '🔄 Carregando via API...';
            
            try {
                const doctorsResult = await callAPI('getData', 'doctors');
                const patientsResult = await callAPI('getData', 'patients');
                
                if (doctorsResult?.success && patientsResult?.success) {
                    doctorsData = doctorsResult.data;
                    doctorsHeaders = doctorsResult.headers || [];
                    patientsData = patientsResult.data;
                    patientsHeaders = patientsResult.headers || [];
                    
                    statusDiv.className = 'status connected';
                    statusDiv.innerHTML = `✅ API OK (${doctorsData.length} médicos, ${patientsData.length} pacientes)`;
                    return true;
                } else {
                    throw new Error('Falha na API');
                }
            } catch (error) {
                console.warn('API falhou, usando fallback CSV:', error);
                return await loadDataFromCSV();
            }
        }

        // Fallback: carregar via CSV direto
        async function loadDataFromCSV() {
            const statusDiv = document.getElementById('apiStatus');
            statusDiv.className = 'status loading';
            statusDiv.innerHTML = '🔄 Carregando via CSV...';
            
            try {
                const doctorsGid = GIDS[currentMode].doctors;
                const patientsGid = GIDS[currentMode].patients;
                const baseUrl = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=`;
                
                const [doctorsRes, patientsRes] = await Promise.all([
                    fetch(`${baseUrl}${doctorsGid}&single=true&output=csv`),
                    fetch(`${baseUrl}${patientsGid}&single=true&output=csv`)
                ]);
                
                const doctorsCSV = await doctorsRes.text();
                const patientsCSV = await patientsRes.text();
                
                const doctorsResult = parseCSV(doctorsCSV);
                const patientsResult = parseCSV(patientsCSV);
                
                doctorsData = doctorsResult.data;
                doctorsHeaders = doctorsResult.headers;
                patientsData = patientsResult.data;
                patientsHeaders = patientsResult.headers;
                
                statusDiv.className = 'status connected';
                statusDiv.innerHTML = `✅ CSV (${doctorsData.length} médicos, ${patientsData.length} pacientes)`;
                return true;
            } catch (error) {
                console.error('Erro CSV:', error);
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Erro de conexão';
                return false;
            }
        }

        function parseCSV(csvText) {
            if (!csvText || csvText.trim() === '') return { headers: [], data: [] };
            const lines = csvText.split('\n').filter(l => l.trim());
            if (lines.length === 0) return { headers: [], data: [] };
            
            const parseLine = (line) => {
                const result = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const c = line[i];
                    if (c === '"') inQuotes = !inQuotes;
                    else if (c === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                    else current += c;
                }
                result.push(current.trim());
                return result;
            };
            
            const headers = parseLine(lines[0]);
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const values = parseLine(lines[i]);
                const record = {};
                headers.forEach((h, idx) => { record[h] = values[idx] || ''; });
                data.push(record);
            }
            return { headers, data };
        }

        function renderDoctorsTable() {
            const headerRow = document.getElementById('doctors-header');
            const bodyRow = document.getElementById('doctors-body');
            if (!doctorsHeaders.length) {
                headerRow.innerHTML = '';
                bodyRow.innerHTML = '<tr><td colspan="10">Nenhum dado carregado</td></tr>';
                return;
            }
            const showHeaders = doctorsHeaders.slice(0, 7);
            headerRow.innerHTML = `<tr>${showHeaders.map(h => `<th>${h}</th>`).join('')}<th>Ações</th></tr>`;
            bodyRow.innerHTML = doctorsData.map(d => `
                <tr>
                    ${showHeaders.map(h => `<td>${d[h] !== undefined ? d[h] : '-'}</td>`).join('')}
                    <td>
                        <button class="edit-btn" onclick="openEditModal('doctor', ${d.id})">✏️</button>
                        <button class="delete-btn" onclick="deleteRecord('doctor', ${d.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function renderPatientsTable() {
            const headerRow = document.getElementById('patients-header');
            const bodyRow = document.getElementById('patients-body');
            if (!patientsHeaders.length) {
                headerRow.innerHTML = '';
                bodyRow.innerHTML = '<tr><td colspan="10">Nenhum dado carregado</td></tr>';
                return;
            }
            const showHeaders = patientsHeaders.slice(0, 7);
            headerRow.innerHTML = `<tr>${showHeaders.map(h => `<th>${h}</th>`).join('')}<th>Ações</th></tr>`;
            bodyRow.innerHTML = patientsData.map(p => `
                <tr>
                    ${showHeaders.map(h => `<td>${p[h] !== undefined ? p[h] : '-'}</td>`).join('')}
                    <td>
                        <button class="edit-btn" onclick="openEditModal('patient', ${p.id})">✏️</button>
                        <button class="delete-btn" onclick="deleteRecord('patient', ${p.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        async function refreshData() {
            await loadDataFromAPI();
            renderDoctorsTable();
            renderPatientsTable();
            showMessage('Dados atualizados!', 'success');
        }

        function openAddModal(type) {
            editingType = type;
            editingId = null;
            const headers = type === 'doctor' ? doctorsHeaders : patientsHeaders;
            document.getElementById('modalTitle').innerHTML = type === 'doctor' ? 'Adicionar Médico/Legista' : 'Adicionar Paciente/Falecido';
            document.getElementById('formFields').innerHTML = headers.map(h => `
                <div class="form-group">
                    <label>${h}</label>
                    ${h === 'medicalNotes' || h === 'patientHistory' ? 
                        `<textarea name="${h}" rows="3"></textarea>` : 
                        `<input type="text" name="${h}">`}
                </div>
            `).join('');
            document.getElementById('editModal').style.display = 'flex';
        }

        function openEditModal(type, id) {
            editingType = type;
            editingId = id;
            const data = type === 'doctor' ? doctorsData : patientsData;
            const record = data.find(r => r.id == id);
            const headers = type === 'doctor' ? doctorsHeaders : patientsHeaders;
            if (!record) { showMessage('Registro não encontrado', 'error'); return; }
            document.getElementById('modalTitle').innerHTML = type === 'doctor' ? 'Editar Médico/Legista' : 'Editar Paciente/Falecido';
            document.getElementById('formFields').innerHTML = headers.map(h => `
                <div class="form-group">
                    <label>${h}</label>
                    ${h === 'medicalNotes' || h === 'patientHistory' ? 
                        `<textarea name="${h}" rows="3">${record[h] || ''}</textarea>` : 
                        `<input type="text" name="${h}" value="${record[h] || ''}">`}
                </div>
            `).join('');
            document.getElementById('editModal').style.display = 'flex';
        }

        async function saveRecord(e) {
            e.preventDefault();
            const form = document.getElementById('editForm');
            const formData = new FormData(form);
            const data = {};
            for (let [key, val] of formData.entries()) data[key] = val;
            
            const type = editingType === 'doctor' ? 'doctors' : 'patients';
            
            if (editingId) {
                const result = await callAPI('updateRecord', type, data, editingId);
                if (result?.success) {
                    showMessage('Registro atualizado com sucesso!', 'success');
                } else {
                    showMessage('Erro ao atualizar: ' + (result?.error || 'desconhecido'), 'error');
                }
            } else {
                data.id = editingType === 'doctor' ? doctorsData.length + 1 : patientsData.length + 1;
                const result = await callAPI('addRecord', type, data);
                if (result?.success) {
                    showMessage('Registro adicionado com sucesso!', 'success');
                } else {
                    showMessage('Erro ao adicionar: ' + (result?.error || 'desconhecido'), 'error');
                }
            }
            
            await refreshData();
            closeModal();
        }

        async function deleteRecord(type, id) {
            if (!confirm('Tem certeza que deseja excluir este registro?')) return;
            
            const result = await callAPI('deleteRecord', type, null, id);
            if (result?.success) {
                showMessage('Registro excluído com sucesso!', 'success');
                await refreshData();
            } else {
                showMessage('Erro ao excluir: ' + (result?.error || 'desconhecido'), 'error');
            }
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
            editingId = null;
            editingType = null;
        }

        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(`${btn.dataset.tab}-tab`).classList.add('active');
                });
            });
        }

        function setupMode() {
            document.getElementById('systemMode').addEventListener('change', async (e) => {
                currentMode = e.target.value;
                await refreshData();
            });
        }

        // Salvar URL da API no localStorage
        function setupApiUrl() {
            const apiInput = document.getElementById('apiUrl');
            const savedUrl = localStorage.getItem('admin_api_url');
            if (savedUrl) apiInput.value = savedUrl;
            
            apiInput.addEventListener('change', () => {
                localStorage.setItem('admin_api_url', apiInput.value);
                refreshData();
            });
        }

        // Inicializar
        async function init() {
            setupTabs();
            setupMode();
            setupApiUrl();
            await refreshData();
        }
        
        init();
    </script>
</body>
</html>
