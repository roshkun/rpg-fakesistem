<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoftMed Solutions</title>
    <link rel="stylesheet" href="css/sistema.css">
    <style>
        /* CSS mínimo de emergência */
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        .loading-spinner { text-align: center; padding: 50px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; width: 40px; height: 40px; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Container principal (igual ao anterior, mas o JavaScript vai popular) -->
    <div class="app-container" id="appContainer" style="display: none;">
        <div class="main-header">
            <div class="header-top">
                <div class="hospital-info">
                    <div class="logo-section">
                        <div class="logo" id="logoContainer"></div>
                        <div class="logo-area">
                            <h1 id="systemTitle"></h1>
                            <p id="systemSubtitle"></p>
                        </div>
                    </div>
                    <div class="hospital-accreditation">
                        <div id="accreditationLine1"></div>
                        <div id="accreditationLine2"></div>
                        <div class="date-area">📅 <span id="currentDate"></span></div>
                    </div>
                </div>
            </div>
            <div class="main-menu">
                <div class="menu-items">
                    <button class="menu-item active" data-page="prontuario" id="menuProntuario"></button>
                    <button class="menu-item" data-page="agenda" id="menuAgenda"></button>
                    <button class="menu-item" data-page="exames" id="menuExames"></button>
                    <button class="menu-item" data-page="prescricoes" id="menuPrescricoes"></button>
                    <button class="menu-item" data-page="relatorios" id="menuRelatorios"></button>
                </div>
            </div>
        </div>
        <div class="main-content">
            <div class="patients-sidebar" id="patientsSidebar">
                <div class="sidebar-header">
                    <h3 id="sidebarTitle"></h3>
                    <p>Total: <span id="totalPatients">0</span></p>
                    <div class="search-box"><input type="text" id="searchInput" placeholder="Buscar..."></div>
                    <div class="user-info">
                        <div class="doctor-name" id="doctorName">---</div>
                        <div class="doctor-crm" id="doctorCRM">---</div>
                        <button class="toggle-sidebar-btn" onclick="toggleSidebar()" id="toggleSidebarBtn"></button>
                        <button class="logout-btn" onclick="logout()" id="logoutBtn"></button>
                    </div>
                </div>
                <div class="patients-list-container"><div class="patients-list" id="patientsList"></div></div>
            </div>
            <div class="content-area" id="contentArea"><div class="loading-spinner"><div class="spinner"></div><p>Carregando...</p></div></div>
        </div>
        <div class="main-footer"><p id="footerText"></p><div class="developer-footer">SoftMed Solutions</div></div>
    </div>

    <button class="toggle-sidebar-float" id="toggleSidebarFloat" onclick="toggleSidebar()">📋</button>
    <div class="lgpd-stamp" id="lgpdStamp"></div>

    <!-- Modais (estrutura mantida) -->
    <div id="loginModal" class="modal"><div class="modal-content"><div class="certificate-icon" id="loginIcon"></div><div class="modal-header" id="loginTitle"></div><div class="modal-body"><p id="loginSubtitle"></p><select id="certificateSelect" class="certificate-select"></select><div class="certificate-info"><p><strong>📋 Informações:</strong></p><p id="certIssuer"></p><p>Validade: 31/12/2025</p><p>Nível: Certificado A3</p></div><div id="loginError" class="login-error"></div></div><button class="btn-login" onclick="authenticateWithCertificate()" id="loginBtn"></button></div></div>
    
    <div id="codeModal" class="modal"><div class="modal-content"><div class="modal-header" id="codeModalTitle"></div><div class="modal-body"><p id="codeModalText"></p><input type="password" id="accessCode" class="code-input" maxlength="6" placeholder="••••••"><div id="codeError" class="error-message"></div><div id="attemptCounter"></div></div><button class="btn-login" onclick="verifyAccessCode()" id="verifyBtn"></button><button class="btn-login" onclick="closeCodeModal()">Cancelar</button></div></div>
    
    <div id="errorModal" class="modal"><div class="modal-content"><div class="error-icon">⚠️</div><div class="modal-header">Erro de Sistema</div><div class="modal-body"><p>Erro de sistema. Recarregue a página.</p></div><button class="reload-btn" onclick="simulateReload()">🔄 Recarregar</button></div></div>
    
    <div id="genericModal" class="modal"><div class="modal-content"><div class="modal-header" id="genericModalTitle"></div><div class="modal-body" id="genericModalBody"></div><button class="btn-login" onclick="closeGenericModal()">Fechar</button></div></div>

    <!-- Scripts modulares -->
    <script src="js/core/constants.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/services/google-sheets.js"></script>
    <script src="js/modules/data.js"></script>
    <script src="js/modules/auth.js"></script>
    <script src="js/modules/ui.js"></script>
    <script src="js/sistema.js"></script>
</body>
</html>
