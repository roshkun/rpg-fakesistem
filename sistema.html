<!-- Modal de Login -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <div class="certificate-icon" id="loginIcon">🔐</div>
        <div class="modal-header" id="loginTitle">Acesso ao Sistema</div>
        <div class="modal-body">
            <p style="text-align:center; margin-bottom:15px;" id="loginSubtitle">Autenticação via Certificado Digital</p>
            <select id="certificateSelect" class="certificate-select">
                <option value="">Carregando profissionais...</option>
            </select>
            <div class="certificate-info" id="certificateInfo">
                <p><strong>📋 Informações do Certificado:</strong></p>
                <p id="certIssuer">Emissor: ICP-Brasil - Autoridade Certificadora Saúde</p>
                <p>Validade: 31/12/2025</p>
                <p>Nível: Certificado A3 - Assinatura Digital</p>
            </div>
            <div id="loginError" class="login-error">❌ Selecione um profissional válido</div>
        </div>
        <button class="btn-login" onclick="authenticateWithCertificate()" id="loginBtn">🔓 Acessar Sistema</button>
    </div>
</div>
