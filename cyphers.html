<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>The Strange | Fichas Interativas - Personagens Nível 1</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c12;
      background-image: radial-gradient(circle at 20% 30%, #12161f 0%, #030407 100%);
      font-family: 'Inter', sans-serif;
      color: #e8eef4;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .container {
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
    }

    /* Navegação entre personagens */
    .nav-personagens {
      background: #0f1820cc;
      backdrop-filter: blur(8px);
      border-radius: 60px;
      padding: 0.8rem 1.2rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      border: 1px solid #2f6d7a;
    }

    .nav-buttons {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: #1e2a32;
      border: none;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      font-weight: bold;
      font-size: 1.2rem;
      color: #bbd4e3;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Cinzel', serif;
    }

    .nav-btn:hover {
      background: #3f7e9c;
      color: white;
      transform: scale(1.05);
    }

    .nav-btn.active {
      background: #4a9bc2;
      color: white;
      box-shadow: 0 0 8px #5fa3c2;
    }

    .personagem-info {
      background: #1e3a44;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: bold;
    }

    .personagem-info i {
      margin-right: 6px;
    }

    /* Card da ficha */
    .ficha-card {
      background: linear-gradient(145deg, #151e24 0%, #0d131a 100%);
      border-radius: 2rem;
      border: 1px solid #2f5e6e;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
      transition: 0.2s;
    }

    .card-header {
      background: #0b1a22;
      padding: 1.2rem 1.5rem;
      border-bottom: 3px solid #4a8ba8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .char-name-input {
      background: transparent;
      border: none;
      font-size: 1.6rem;
      font-weight: bold;
      font-family: 'Cinzel', serif;
      color: #daf0ff;
      width: 60%;
      border-bottom: 2px dashed #548eaa;
      outline: none;
      padding: 0.2rem 0;
    }

    .char-name-input:focus {
      border-bottom-color: #eccf8b;
    }

    .type-badge {
      background: #2a5e72;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .card-body {
      padding: 1.5rem;
    }

    .stat-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }

    .stat-box {
      flex: 1;
      background: #0c141c;
      border-radius: 1rem;
      padding: 0.7rem;
      text-align: center;
      border: 1px solid #2f6d7a;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #9abfd0;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #eccf8b;
    }

    input.stat-input {
      background: #00000077;
      border: 1px solid #548eaa;
      border-radius: 12px;
      width: 80px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: #ffdfa5;
      padding: 0.3rem;
    }

    .pool-section {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin: 1rem 0;
    }

    .pool {
      background: #0f1820;
      padding: 0.6rem;
      border-radius: 1rem;
      text-align: center;
      flex: 1;
    }

    .pool-input {
      width: 70px;
      background: #00000066;
      border: 1px solid #557e8f;
      border-radius: 30px;
      text-align: center;
      font-weight: bold;
      font-size: 1.2rem;
      color: #eccf8b;
      padding: 5px;
    }

    .focus-area {
      background: #0e1a21;
      border-radius: 1rem;
      padding: 1rem;
      margin: 1rem 0;
    }

    .focus-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .focus-input {
      background: #0a1118;
      border: 1px solid #3b6d7e;
      border-radius: 30px;
      padding: 6px 12px;
      color: #eef4fc;
      font-size: 0.85rem;
      flex: 1;
      outline: none;
    }

    textarea {
      width: 100%;
      background: #0a1118;
      border: 1px solid #3b6d7e;
      border-radius: 12px;
      padding: 8px 12px;
      color: #eef4fc;
      font-size: 0.8rem;
      resize: vertical;
      font-family: 'Inter', monospace;
      margin: 0.5rem 0;
    }

    .section-title {
      font-weight: bold;
      margin: 0.8rem 0 0.3rem 0;
      color: #c7e2f0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 1.2rem;
      justify-content: flex-end;
    }

    .btn-reset {
      background: #2c4b3b;
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      cursor: pointer;
      color: #e6f7d3;
      transition: 0.2s;
    }

    .btn-reset:hover {
      background: #4e7b63;
    }

    .btn-save {
      background: #3f6e5c;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.7rem;
      color: #6e8c9b;
    }

    .aviso-url {
      background: #1a2f38;
      border-radius: 30px;
      padding: 0.4rem 1rem;
      font-size: 0.7rem;
      text-align: center;
      margin-top: 1rem;
      font-family: monospace;
    }

    @media (max-width: 550px) {
      body { padding: 1rem; }
      .stat-row { flex-direction: column; }
      .pool-section { flex-direction: column; }
      .char-name-input { width: 100%; font-size: 1.3rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="nav-personagens">
    <div class="nav-buttons" id="navButtons">
      <!-- botões 1 a 6 gerados via js -->
    </div>
    <div class="personagem-info" id="personagemInfo">
      <i class="fas fa-dice-d6"></i> <span id="currentIdDisplay">Personagem 1</span>
    </div>
  </div>

  <div id="fichaContainer" class="ficha-card">
    <!-- a ficha será injetada aqui -->
    <div style="text-align: center; padding: 3rem;">Carregando...</div>
  </div>
  <div class="aviso-url">
    <i class="fas fa-link"></i> Dica: use <strong>?personagem=1</strong> até <strong>?personagem=6</strong> na URL para abrir direto
  </div>
  <footer>
    <i class="fas fa-portal-enter"></i> The Strange — Fichas Nível 1 (2 Vectors · 2 Paradox · 2 Spinners) — Edite tudo e persiste na sessão
  </footer>
</div>

<script>
  // ===================== DADOS DOS 6 PERSONAGENS =====================
  // ID 1 a 6 (index 0 a 5)
  const personagens = [
    { // 1 - Vector
      id: 1,
      name: "Kaelen Voss",
      type: "Vector",
      descriptor: "Astuto",
      focus: "Que Luta com Estilo",
      might: 10, maxMight: 10,
      speed: 12, maxSpeed: 12,
      intellect: 11, maxIntellect: 11,
      effort: 1, xp: 0,
      abilities: "Treinado em Combate corpo a corpo. +1 em ataques com armas leves. Movimento extra 1x por cena.",
      equipment: "Espada curta, armadura reforçada, kit de escalada, 3 poções menores.",
      skills: "Furtividade (treinado), Luta (especializado), Percepção, Atletismo"
    },
    { // 2 - Vector
      id: 2,
      name: "Rhea Ashford",
      type: "Vector",
      descriptor: "Rápido",
      focus: "Que Usa Intimidação",
      might: 11, maxMight: 11,
      speed: 13, maxSpeed: 13,
      intellect: 9, maxIntellect: 9,
      effort: 1, xp: 0,
      abilities: "Ação rápida: +2 em testes de Iniciativa. Pode usar intimidação em combate como ação menor.",
      equipment: "Besta leve, adaga, itens de camuflagem, capuz sombrio",
      skills: "Enganação, Iniciativa, Atletismo, Intimidação"
    },
    { // 3 - Paradox
      id: 3,
      name: "Morwen Thorne",
      type: "Paradox",
      descriptor: "Enigmático",
      focus: "Que Manipula Realidades",
      might: 8, maxMight: 8,
      speed: 9, maxSpeed: 9,
      intellect: 14, maxIntellect: 14,
      effort: 1, xp: 0,
      abilities: "Traduzir qualquer língua. +2 em testes de tradução de foco. Detecta anomalias estranhas a 10m.",
      equipment: "Cajado de foco, diário de recursões, cristal estranho, pergaminhos",
      skills: "Conhecimento (The Strange), Investigação, Idiomas, Ocultismo"
    },
    { // 4 - Paradox
      id: 4,
      name: "Orin Vex",
      type: "Paradox",
      descriptor: "Visionário",
      focus: "Que Comanda Energia Estranha",
      might: 7, maxMight: 7,
      speed: 10, maxSpeed: 10,
      intellect: 15, maxIntellect: 15,
      effort: 1, xp: 0,
      abilities: "Pequenas distorções: gastando 1 de Intellect, faz um objeto flutuar. +1 em testes de percepção translocal.",
      equipment: "Amuleto de foco, grimório de notas, óculos especiais, essência prismática",
      skills: "Ocultismo, Detecção de portais, História das recursões, Raciocínio"
    },
    { // 5 - Spinner
      id: 5,
      name: "Lyra Nox",
      type: "Spinner",
      descriptor: "Ágil",
      focus: "Que Esgrime com Duas Armas",
      might: 9, maxMight: 9,
      speed: 14, maxSpeed: 14,
      intellect: 9, maxIntellect: 9,
      effort: 1, xp: 0,
      abilities: "Duas armas: ataque duplo com -1 de penalidade. +1 em esquiva quando em movimento. Ação de movimento extra 1/dia.",
      equipment: "Duas adagas, armadura de couro reforçada, kit de furtividade, corda de seda",
      skills: "Acrobacia, Furtividade, Iniciativa, Esquiva"
    },
    { // 6 - Spinner
      id: 6,
      name: "Jax Korr",
      type: "Spinner",
      descriptor: "Ousado",
      focus: "Que Surge das Sombras",
      might: 10, maxMight: 10,
      speed: 13, maxSpeed: 13,
      intellect: 8, maxIntellect: 8,
      effort: 1, xp: 0,
      abilities: "Furtividade em combate: pode se esconder como ação menor. Ataque furtivo +1 de dano. Visão no escuro 10m.",
      equipment: "Bastão de choque, capuz sombrio, ferramentas de infiltração, adaga oculta",
      skills: "Furtividade, Ladinagem, Percepção, Jogatina"
    }
  ];

  // carrega dados salvos no localStorage (persistência)
  function loadFromStorage() {
    for (let i = 0; i < personagens.length; i++) {
      const saved = localStorage.getItem(`thestrange_char_${personagens[i].id}`);
      if (saved) {
        try {
          const data = JSON.parse(saved);
          Object.assign(personagens[i], data);
        } catch(e) {}
      }
    }
  }

  function saveToStorage(char) {
    localStorage.setItem(`thestrange_char_${char.id}`, JSON.stringify(char));
  }

  // renderiza a ficha do personagem ativo (id de 1 a 6)
  let currentCharId = 1;

  function renderFicha() {
    const char = personagens.find(c => c.id === currentCharId);
    if (!char) return;
    
    const container = document.getElementById('fichaContainer');
    container.innerHTML = `
      <div class="card-header">
        <input type="text" class="char-name-input" id="charName" value="${escapeHtml(char.name)}" placeholder="Nome do personagem">
        <span class="type-badge"><i class="fas ${char.type === 'Vector' ? 'fa-shield-alt' : (char.type === 'Paradox' ? 'fa-brain' : 'fa-bolt')}"></i> ${char.type} · NÍVEL 1</span>
      </div>
      <div class="card-body">
        <div class="stat-row">
          <div class="stat-box">
            <div class="stat-label">💪 FORÇA (Might)</div>
            <input type="number" class="stat-input" id="mightVal" value="${char.might}" step="1"> / <span id="maxMightSpan">${char.maxMight}</span>
          </div>
          <div class="stat-box">
            <div class="stat-label">⚡ DESTREZA (Speed)</div>
            <input type="number" class="stat-input" id="speedVal" value="${char.speed}" step="1"> / <span id="maxSpeedSpan">${char.maxSpeed}</span>
          </div>
          <div class="stat-box">
            <div class="stat-label">🧠 INTELECTO (Intellect)</div>
            <input type="number" class="stat-input" id="intellectVal" value="${char.intellect}" step="1"> / <span id="maxIntellectSpan">${char.maxIntellect}</span>
          </div>
        </div>
        
        <div class="pool-section">
          <div class="pool">
            <div class="stat-label"><i class="fas fa-bolt"></i> ESFORÇO (Effort)</div>
            <input type="number" class="pool-input" id="effortVal" value="${char.effort}" min="0" max="3" step="1">
          </div>
          <div class="pool">
            <div class="stat-label"><i class="fas fa-star"></i> EXPERIÊNCIA (XP)</div>
            <input type="number" class="pool-input" id="xpVal" value="${char.xp}" min="0" step="1">
          </div>
        </div>

        <div class="focus-area">
          <div class="focus-row">
            <input type="text" id="descriptorVal" class="focus-input" value="${escapeHtml(char.descriptor)}" placeholder="Descritor">
            <input type="text" id="focusVal" class="focus-input" value="${escapeHtml(char.focus)}" placeholder="Foco">
          </div>
        </div>

        <div class="section-title"><i class="fas fa-dice-d6"></i> HABILIDADES ESPECIAIS</div>
        <textarea id="abilitiesVal" rows="2">${escapeHtml(char.abilities)}</textarea>

        <div class="section-title"><i class="fas fa-toolbox"></i> EQUIPAMENTOS</div>
        <textarea id="equipmentVal" rows="2">${escapeHtml(char.equipment)}</textarea>

        <div class="section-title"><i class="fas fa-chart-line"></i> PERÍCIAS TREINADAS</div>
        <textarea id="skillsVal" rows="2">${escapeHtml(char.skills)}</textarea>

        <div class="button-group">
          <button class="btn-reset" id="resetBtn"><i class="fas fa-undo-alt"></i> Restaurar original</button>
          <button class="btn-reset btn-save" id="saveBtn"><i class="fas fa-save"></i> Salvar alterações</button>
        </div>
      </div>
    `;

    // eventos após renderizar
    attachEvents(char);
    document.getElementById('personagemInfo').innerHTML = `<i class="fas fa-user"></i> ${char.name} · ${char.type} · ID ${char.id}`;
    document.getElementById('currentIdDisplay').innerText = `Personagem ${char.id}`;
  }

  function attachEvents(char) {
    // campos editáveis
    const nameInput = document.getElementById('charName');
    const mightInput = document.getElementById('mightVal');
    const speedInput = document.getElementById('speedVal');
    const intInput = document.getElementById('intellectVal');
    const effortInput = document.getElementById('effortVal');
    const xpInput = document.getElementById('xpVal');
    const descriptorInput = document.getElementById('descriptorVal');
    const focusInput = document.getElementById('focusVal');
    const abilitiesTA = document.getElementById('abilitiesVal');
    const equipmentTA = document.getElementById('equipmentVal');
    const skillsTA = document.getElementById('skillsVal');

    function syncChar() {
      char.name = nameInput.value;
      char.descriptor = descriptorInput.value;
      char.focus = focusInput.value;
      char.abilities = abilitiesTA.value;
      char.equipment = equipmentTA.value;
      char.skills = skillsTA.value;
      
      let newMight = parseInt(mightInput.value);
      if (!isNaN(newMight) && newMight >= 0 && newMight <= char.maxMight) char.might = newMight;
      else mightInput.value = char.might;
      
      let newSpeed = parseInt(speedInput.value);
      if (!isNaN(newSpeed) && newSpeed >= 0 && newSpeed <= char.maxSpeed) char.speed = newSpeed;
      else speedInput.value = char.speed;
      
      let newInt = parseInt(intInput.value);
      if (!isNaN(newInt) && newInt >= 0 && newInt <= char.maxIntellect) char.intellect = newInt;
      else intInput.value = char.intellect;
      
      let newEffort = parseInt(effortInput.value);
      if (!isNaN(newEffort) && newEffort >= 0) char.effort = newEffort;
      else effortInput.value = char.effort;
      
      let newXp = parseInt(xpInput.value);
      if (!isNaN(newXp)) char.xp = newXp;
      else xpInput.value = char.xp;
      
      saveToStorage(char);
      document.getElementById('personagemInfo').innerHTML = `<i class="fas fa-user"></i> ${char.name} · ${char.type} · ID ${char.id}`;
    }

    const inputs = [nameInput, mightInput, speedInput, intInput, effortInput, xpInput, descriptorInput, focusInput, abilitiesTA, equipmentTA, skillsTA];
    inputs.forEach(inp => {
      if (inp) inp.addEventListener('change', syncChar);
      if (inp && inp.tagName !== 'TEXTAREA') inp.addEventListener('input', syncChar);
    });
    
    // botão reset (restaura valores originais do array base, mas mantém apenas os defaults)
    const resetBtn = document.getElementById('resetBtn');
    const originalChar = personagens.find(p => p.id === char.id);
    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        char.name = originalChar.name;
        char.descriptor = originalChar.descriptor;
        char.focus = originalChar.focus;
        char.might = originalChar.maxMight;
        char.speed = originalChar.maxSpeed;
        char.intellect = originalChar.maxIntellect;
        char.effort = 1;
        char.xp = 0;
        char.abilities = originalChar.abilities;
        char.equipment = originalChar.equipment;
        char.skills = originalChar.skills;
        saveToStorage(char);
        renderFicha(); // re-render
      });
    }
    
    const saveBtn = document.getElementById('saveBtn');
    if (saveBtn) {
      saveBtn.addEventListener('click', () => {
        syncChar();
        alert(`Personagem ${char.name} salvo!`);
      });
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // navegação pelos personagens
  function setPersonagem(id) {
    if (id < 1) id = 1;
    if (id > 6) id = 6;
    currentCharId = id;
    renderFicha();
    updateActiveButton();
    // atualiza URL sem recarregar
    const url = new URL(window.location);
    url.searchParams.set('personagem', id);
    window.history.pushState({}, '', url);
  }

  function updateActiveButton() {
    const btns = document.querySelectorAll('.nav-btn');
    btns.forEach(btn => {
      const btnId = parseInt(btn.getAttribute('data-id'));
      if (btnId === currentCharId) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }

  function createNavButtons() {
    const navDiv = document.getElementById('navButtons');
    navDiv.innerHTML = '';
    for (let i = 1; i <= 6; i++) {
      const btn = document.createElement('button');
      btn.className = 'nav-btn';
      btn.textContent = i;
      btn.setAttribute('data-id', i);
      btn.addEventListener('click', () => setPersonagem(i));
      navDiv.appendChild(btn);
    }
  }

  // inicialização: lê parâmetro URL
  function initFromUrl() {
    const params = new URLSearchParams(window.location.search);
    let paramId = params.get('personagem');
    if (paramId) {
      let idNum = parseInt(paramId);
      if (!isNaN(idNum) && idNum >= 1 && idNum <= 6) {
        currentCharId = idNum;
      } else {
        currentCharId = 1;
      }
    } else {
      currentCharId = 1;
    }
    loadFromStorage();
    createNavButtons();
    renderFicha();
    updateActiveButton();
  }

  initFromUrl();
</script>
</body>
</html>
