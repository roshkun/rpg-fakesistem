<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>The Strange | Fichas Interativas - Gerador de Cyphers</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c12;
      background-image: radial-gradient(circle at 20% 30%, #12161f 0%, #030407 100%);
      font-family: 'Inter', sans-serif;
      color: #e8eef4;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 750px;
      width: 100%;
      margin: 0 auto;
    }

    .personagem-header {
      background: #0f1820cc;
      backdrop-filter: blur(8px);
      border-radius: 60px;
      padding: 0.8rem 1.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
      border: 1px solid #2f6d7a;
    }

    .personagem-info {
      background: #1e3a44;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      display: inline-block;
      font-size: 0.85rem;
      font-weight: bold;
    }

    .ficha-card {
      background: linear-gradient(145deg, #151e24 0%, #0d131a 100%);
      border-radius: 2rem;
      border: 1px solid #2f5e6e;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
      margin-bottom: 1.5rem;
    }

    .card-header {
      background: #0b1a22;
      padding: 1.2rem 1.5rem;
      border-bottom: 3px solid #4a8ba8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .char-name-input {
      background: transparent;
      border: none;
      font-size: 1.6rem;
      font-weight: bold;
      font-family: 'Cinzel', serif;
      color: #daf0ff;
      width: 60%;
      border-bottom: 2px dashed #548eaa;
      outline: none;
      padding: 0.2rem 0;
    }

    .type-badge {
      background: #2a5e72;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .card-body {
      padding: 1.5rem;
    }

    .stat-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }

    .stat-box {
      flex: 1;
      background: #0c141c;
      border-radius: 1rem;
      padding: 0.7rem;
      text-align: center;
      border: 1px solid #2f6d7a;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #9abfd0;
      letter-spacing: 1px;
    }

    input.stat-input {
      background: #00000077;
      border: 1px solid #548eaa;
      border-radius: 12px;
      width: 80px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: #ffdfa5;
      padding: 0.3rem;
    }

    .pool-section {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin: 1rem 0;
    }

    .pool {
      background: #0f1820;
      padding: 0.6rem;
      border-radius: 1rem;
      text-align: center;
      flex: 1;
    }

    .pool-input {
      width: 70px;
      background: #00000066;
      border: 1px solid #557e8f;
      border-radius: 30px;
      text-align: center;
      font-weight: bold;
      font-size: 1.2rem;
      color: #eccf8b;
      padding: 5px;
    }

    .focus-area {
      background: #0e1a21;
      border-radius: 1rem;
      padding: 1rem;
      margin: 1rem 0;
    }

    .focus-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .focus-input {
      background: #0a1118;
      border: 1px solid #3b6d7e;
      border-radius: 30px;
      padding: 6px 12px;
      color: #eef4fc;
      font-size: 0.85rem;
      flex: 1;
      outline: none;
    }

    textarea {
      width: 100%;
      background: #0a1118;
      border: 1px solid #3b6d7e;
      border-radius: 12px;
      padding: 8px 12px;
      color: #eef4fc;
      font-size: 0.8rem;
      resize: vertical;
      font-family: 'Inter', monospace;
      margin: 0.5rem 0;
    }

    .section-title {
      font-weight: bold;
      margin: 0.8rem 0 0.3rem 0;
      color: #c7e2f0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 1.2rem;
      justify-content: flex-end;
    }

    .btn-reset {
      background: #2c4b3b;
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      cursor: pointer;
      color: #e6f7d3;
      transition: 0.2s;
    }

    .btn-save {
      background: #3f6e5c;
    }

    .cypher-section {
      background: linear-gradient(145deg, #1a252f 0%, #0f1a22 100%);
      border-radius: 1.5rem;
      border: 1px solid #d4af37;
      overflow: hidden;
    }

    .cypher-header {
      background: #2a3a2c;
      padding: 0.8rem 1.2rem;
      border-bottom: 1px solid #d4af37;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .cypher-header h3 {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: #f5d87a;
    }

    .btn-cypher {
      background: #b47c2e;
      border: none;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: bold;
      color: #1e1a0f;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Cinzel', serif;
    }

    .btn-cypher:hover {
      background: #d69d48;
      transform: scale(1.02);
    }

    .cypher-content {
      padding: 1rem 1.2rem;
    }

    .cypher-card {
      background: #0f191f;
      border-radius: 1rem;
      padding: 0.8rem;
      border-left: 4px solid #d4af37;
      margin-bottom: 0.5rem;
    }

    .cypher-name {
      font-weight: bold;
      font-size: 1rem;
      color: #f5d87a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .cypher-level {
      background: #4a6b3c;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.7rem;
    }

    .cypher-effect {
      font-size: 0.8rem;
      margin-top: 6px;
      color: #c7e2f0;
      line-height: 1.4;
    }

    .cypher-use {
      font-size: 0.7rem;
      margin-top: 8px;
      color: #9abfd0;
      font-style: italic;
    }

    .add-cypher-btn {
      background: #4a6b3c;
      border: none;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      cursor: pointer;
      color: white;
      margin-top: 10px;
      width: 100%;
      transition: 0.2s;
      font-weight: bold;
    }

    .add-cypher-btn:hover {
      background: #6a9b5c;
    }

    .inventory-cyphers {
      margin-top: 1rem;
      padding-top: 0.5rem;
      border-top: 1px solid #3f6d5c;
    }

    .cypher-limit-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
      font-size: 0.75rem;
      background: #0c141c;
      padding: 0.4rem 0.8rem;
      border-radius: 30px;
    }

    .cypher-tag {
      background: #2a5e72;
      display: inline-block;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      margin: 4px 6px 4px 0;
      cursor: pointer;
      transition: 0.1s;
    }

    .cypher-tag:hover {
      background: #c97e2a;
      text-decoration: line-through;
    }

    .limit-warning {
      color: #ffaa66;
      font-size: 0.7rem;
      margin-top: 8px;
      text-align: center;
      padding: 6px;
      background: #2a2a1a;
      border-radius: 20px;
    }

    footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.7rem;
      color: #6e8c9b;
    }

    @media (max-width: 550px) {
      body { padding: 1rem; }
      .stat-row { flex-direction: column; }
      .pool-section { flex-direction: column; }
      .char-name-input { width: 100%; font-size: 1.3rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="personagem-header">
    <div class="personagem-info" id="personagemInfo">
      <i class="fas fa-dice-d6"></i> <span id="currentIdDisplay">Carregando...</span>
    </div>
  </div>

  <div id="fichaContainer" class="ficha-card">
    <div style="text-align: center; padding: 3rem;">Carregando...</div>
  </div>

  <div class="cypher-section">
    <div class="cypher-header">
      <h3><i class="fas fa-gem"></i> GERADOR DE CYPHERS (Cifras)</h3>
      <button class="btn-cypher" id="generateCypherBtn"><i class="fas fa-dice-d20"></i> Gerar Novo Cypher</button>
    </div>
    <div class="cypher-content">
      <div id="currentCypherDisplay"></div>
      <div class="inventory-cyphers">
        <div class="cypher-limit-info">
          <span><i class="fas fa-backpack"></i> INVENTÁRIO DE CYPHERS</span>
          <span id="cypherCounter">0 / 0</span>
        </div>
        <div id="cypherInventoryList"></div>
        <div style="font-size: 0.7rem; color: #9abfd0; margin-top: 8px; text-align: center;">
          ⚠️ Clique em um cypher para usá-lo (consumo único)
        </div>
      </div>
    </div>
  </div>

  <footer>
    <i class="fas fa-portal-enter"></i> The Strange — Limites: Vector (3) | Paradox (2) | Spinner (4)
  </footer>
</div>

<script>
  const cypherLimits = {
    "Vector": 3,
    "Paradox": 2,
    "Spinner": 4
  };

  const cypherDatabase = [
    { name: "Elixir de Cura Rápida", levelRange: "1d6", effect: "Recupera {level}+2 pontos de Might ou Speed (escolha).", use: "Ação para consumir." },
    { name: "Escudo de Energia", levelRange: "1d4", effect: "Ganha +3 de Armadura por 10 minutos ou até sofrer 3 ataques.", use: "Ação para ativar." },
    { name: "Granada de Concussão", levelRange: "1d6+1", effect: "Causa 2d6 de dano em área de 3m (teste de Speed para reduzir à metade).", use: "Ação para arremessar." },
    { name: "Olhos do Vidente", levelRange: "1d4", effect: "Enxerga através de ilusões e invisibilidade por 1 hora.", use: "Ação para ativar." },
    { name: "Pergaminho de Teletransporte", levelRange: "1d8", effect: "Teletransporta você e até 2 aliados até 50m de distância.", use: "Ação para ler." },
    { name: "Soro de Agilidade", levelRange: "1d4", effect: "+2 em testes de Speed e +1 em esquiva por 1 hora.", use: "Ação para injetar." },
    { name: "Bomba de Fumaça Arcana", levelRange: "1d4", effect: "Cria nuvem de fumaça em área de 6m por 5 minutos.", use: "Ação para arremessar." },
    { name: "Amuleto de Proteção", levelRange: "1d6", effect: "Resistência +4 contra um tipo de dano por 1 hora.", use: "Ação para ativar." },
    { name: "Pó do Salto", levelRange: "1d4", effect: "Pode saltar até 10m verticalmente ou 20m horizontalmente por 10 minutos.", use: "Ação para consumir." },
    { name: "Cristal de Foco Mental", levelRange: "1d6", effect: "Recupera {level}+2 pontos de Intellect. +2 em testes de Intelecto por 10 min.", use: "Ação para quebrar." },
    { name: "Lâmina Fantasma", levelRange: "1d8", effect: "Invoca uma arma etérea que causa 2d6 de dano e ignora armadura.", use: "Ação para conjurar." },
    { name: "Poção de Invisibilidade", levelRange: "1d6", effect: "Fica invisível por 15 minutos. Atacar quebra o efeito.", use: "Ação para beber." },
    { name: "Glifo de Explosão", levelRange: "1d10", effect: "Causa 4d6 de dano em área de 5m. Teste de Speed para reduzir.", use: "Ação para colocar." },
    { name: "Essência de Recuperação", levelRange: "1d4", effect: "Remove uma condição negativa (envenenado, atordoado, etc).", use: "Ação para aplicar." },
    { name: "Capa de Camaleão", levelRange: "1d6", effect: "+4 em Furtividade por 30 minutos.", use: "Ação para vestir." },
    { name: "Orbe Temporal", levelRange: "1d12", effect: "Permite realizar uma ação extra no seu turno. Uso único.", use: "Ação livre." },
    { name: "Pergaminho de Invocação", levelRange: "1d6", effect: "Invoca um aliado animal ou elemental por 10 minutos.", use: "Ação para ler." },
    { name: "Poção de Resistência", levelRange: "1d8", effect: "Resistência a todos os tipos de dano por 5 minutos.", use: "Ação para beber." },
    { name: "Bomba de Luz Cegante", levelRange: "1d4", effect: "Cega todos em área de 4m por 2 rodadas (teste de Speed evita).", use: "Ação para arremessar." },
    { name: "Cajado de Fogo", levelRange: "1d6", effect: "Dispara rajada de fogo que causa 3d6 de dano em linha reta.", use: "Ação para ativar." }
  ];

  function rollDice(diceStr) {
    if (diceStr.includes('d')) {
      const parts = diceStr.split('d');
      const num = parseInt(parts[0]) || 1;
      const secondPart = parts[1].split('+');
      const size = parseInt(secondPart[0]);
      let total = 0;
      for (let i = 0; i < num; i++) total += Math.floor(Math.random() * size) + 1;
      if (secondPart[1]) total += parseInt(secondPart[1]);
      return total;
    }
    return parseInt(diceStr) || 1;
  }

  function generateRandomCypher() {
    const randomIndex = Math.floor(Math.random() * cypherDatabase.length);
    const base = cypherDatabase[randomIndex];
    const rolledLevel = rollDice(base.levelRange);
    let effect = base.effect.replace('{level}', rolledLevel);
    return {
      name: base.name,
      level: rolledLevel,
      effect: effect,
      use: base.use,
      id: Date.now() + Math.random()
    };
  }

  const personagens = [
    { id: 1, name: "Kaelen Voss", type: "Vector", descriptor: "Astuto", focus: "Que Luta com Estilo", might: 10, maxMight: 10, speed: 12, maxSpeed: 12, intellect: 11, maxIntellect: 11, effort: 1, xp: 0, abilities: "Treinado em Combate corpo a corpo. +1 em ataques com armas leves. Movimento extra 1x por cena.", equipment: "Espada curta, armadura reforçada, kit de escalada, 3 poções menores.", skills: "Furtividade (treinado), Luta (especializado), Percepção, Atletismo", cyphers: [] },
    { id: 2, name: "Rhea Ashford", type: "Vector", descriptor: "Rápido", focus: "Que Usa Intimidação", might: 11, maxMight: 11, speed: 13, maxSpeed: 13, intellect: 9, maxIntellect: 9, effort: 1, xp: 0, abilities: "Ação rápida: +2 em testes de Iniciativa. Pode usar intimidação em combate como ação menor.", equipment: "Besta leve, adaga, itens de camuflagem, capuz sombrio", skills: "Enganação, Iniciativa, Atletismo, Intimidação", cyphers: [] },
    { id: 3, name: "Morwen Thorne", type: "Paradox", descriptor: "Enigmático", focus: "Que Manipula Realidades", might: 8, maxMight: 8, speed: 9, maxSpeed: 9, intellect: 14, maxIntellect: 14, effort: 1, xp: 0, abilities: "Traduzir qualquer língua. +2 em testes de tradução. Detecta anomalias estranhas a 10m.", equipment: "Cajado de foco, diário de recursões, cristal estranho, pergaminhos", skills: "Conhecimento (The Strange), Investigação, Idiomas, Ocultismo", cyphers: [] },
    { id: 4, name: "Orin Vex", type: "Paradox", descriptor: "Visionário", focus: "Que Comanda Energia Estranha", might: 7, maxMight: 7, speed: 10, maxSpeed: 10, intellect: 15, maxIntellect: 15, effort: 1, xp: 0, abilities: "Pequenas distorções: gastando 1 de Intellect, faz um objeto flutuar. +1 em percepção translocal.", equipment: "Amuleto de foco, grimório de notas, óculos especiais, essência prismática", skills: "Ocultismo, Detecção de portais, História das recursões, Raciocínio", cyphers: [] },
    { id: 5, name: "Lyra Nox", type: "Spinner", descriptor: "Ágil", focus: "Que Esgrime com Duas Armas", might: 9, maxMight: 9, speed: 14, maxSpeed: 14, intellect: 9, maxIntellect: 9, effort: 1, xp: 0, abilities: "Duas armas: ataque duplo com -1 de penalidade. +1 em esquiva quando em movimento.", equipment: "Duas adagas, armadura de couro reforçada, kit de furtividade, corda de seda", skills: "Acrobacia, Furtividade, Iniciativa, Esquiva", cyphers: [] },
    { id: 6, name: "Jax Korr", type: "Spinner", descriptor: "Ousado", focus: "Que Surge das Sombras", might: 10, maxMight: 10, speed: 13, maxSpeed: 13, intellect: 8, maxIntellect: 8, effort: 1, xp: 0, abilities: "Furtividade em combate: pode se esconder como ação menor. Ataque furtivo +1 de dano.", equipment: "Bastão de choque, capuz sombrio, ferramentas de infiltração, adaga oculta", skills: "Furtividade, Ladinagem, Percepção, Jogatina", cyphers: [] }
  ];

  function loadFromStorage() {
    for (let i = 0; i < personagens.length; i++) {
      const saved = localStorage.getItem(`thestrange_char_${personagens[i].id}`);
      if (saved) {
        try {
          const data = JSON.parse(saved);
          Object.assign(personagens[i], data);
        } catch(e) {}
      }
    }
  }

  function saveToStorage(char) {
    localStorage.setItem(`thestrange_char_${char.id}`, JSON.stringify(char));
  }

  let currentCharId = 1;
  let currentGeneratedCypher = null;

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function getCypherLimitForChar(char) {
    return cypherLimits[char.type] || 3;
  }

  function updateCypherDisplay() {
    const char = personagens.find(c => c.id === currentCharId);
    if (!char) return;
    const limit = getCypherLimitForChar(char);
    const currentCount = char.cyphers.length;
    const canAdd = currentCount < limit;
    
    const displayDiv = document.getElementById('currentCypherDisplay');
    if (currentGeneratedCypher) {
      displayDiv.innerHTML = `
        <div class="cypher-card">
          <div class="cypher-name">
            <span><i class="fas fa-gem"></i> ${escapeHtml(currentGeneratedCypher.name)}</span>
            <span class="cypher-level">Nível ${currentGeneratedCypher.level}</span>
          </div>
          <div class="cypher-effect">✨ ${escapeHtml(currentGeneratedCypher.effect)}</div>
          <div class="cypher-use">📜 ${escapeHtml(currentGeneratedCypher.use)}</div>
          ${canAdd ? `<button class="add-cypher-btn" id="addCypherBtn"><i class="fas fa-plus-circle"></i> Adicionar ao inventário (${currentCount}/${limit})</button>` : 
            `<div class="limit-warning"><i class="fas fa-exclamation-triangle"></i> Limite atingido! (${currentCount}/${limit}) - Remova um cypher primeiro</div>`}
        </div>
      `;
      if (canAdd) {
        const addBtn = document.getElementById('addCypherBtn');
        if (addBtn) addBtn.onclick = () => addCypherToInventory();
      }
    } else {
      displayDiv.innerHTML = `
        <div class="cypher-card">
          <div class="cypher-name"><i class="fas fa-dice-d20"></i> Clique em "Gerar Novo Cypher"</div>
          <div class="cypher-effect">Um item de poder único será gerado aleatoriamente</div>
        </div>
      `;
    }
  }

  function addCypherToInventory() {
    if (!currentGeneratedCypher) {
      alert("Gere um cypher primeiro!");
      return;
    }
    const char = personagens.find(c => c.id === currentCharId);
    if (char) {
      const limit = getCypherLimitForChar(char);
      if (char.cyphers.length >= limit) {
        alert(`Limite de cyphers atingido! ${char.type} pode carregar no máximo ${limit} cyphers.`);
        return;
      }
      char.cyphers.push({ ...currentGeneratedCypher, invId: Date.now() + Math.random() });
      saveToStorage(char);
      renderCypherInventory();
      updateCypherDisplay();
    }
  }

  function renderCypherInventory() {
    const char = personagens.find(c => c.id === currentCharId);
    const container = document.getElementById('cypherInventoryList');
    const limit = getCypherLimitForChar(char);
    const currentCount = char?.cyphers?.length || 0;
    
    const counterSpan = document.getElementById('cypherCounter');
    if (counterSpan) {
      counterSpan.innerHTML = `${currentCount} / ${limit}`;
      counterSpan.style.color = currentCount >= limit ? '#ffaa66' : '#9abfd0';
    }
    
    if (!char || !char.cyphers || char.cyphers.length === 0) {
      container.innerHTML = '<div style="color:#9abfd0; font-size:0.75rem; padding:0.8rem; text-align:center;">📦 Nenhum cypher no inventário. Gere e adicione!</div>';
      return;
    }
    
    container.innerHTML = char.cyphers.map((cy, idx) => `
      <div class="cypher-tag" data-cypher-index="${idx}">
        <i class="fas fa-gem"></i> ${escapeHtml(cy.name)} <span style="font-size:0.65rem;">(Nv.${cy.level})</span>
      </div>
    `).join('');
    
    document.querySelectorAll('.cypher-tag').forEach(tag => {
      tag.onclick = (e) => {
        const idx = parseInt(tag.getAttribute('data-cypher-index'));
        if (!isNaN(idx) && char.cyphers[idx]) {
          const cypher = char.cyphers[idx];
          if (confirm(`Usar "${cypher.name}"?\n\nNível: ${cypher.level}\nEfeito: ${cypher.effect}\n\nO cypher será consumido após o uso.`)) {
            char.cyphers.splice(idx, 1);
            saveToStorage(char);
            renderCypherInventory();
            updateCypherDisplay();
          }
        }
      };
    });
  }

  function generateNewCypher() {
    currentGeneratedCypher = generateRandomCypher();
    updateCypherDisplay();
  }

  function renderFicha() {
    const char = personagens.find(c => c.id === currentCharId);
    if (!char) return;
    
    const container = document.getElementById('fichaContainer');
    container.innerHTML = `
      <div class="card-header">
        <input type="text" class="char-name-input" id="charName" value="${escapeHtml(char.name)}">
        <span class="type-badge"><i class="fas ${char.type === 'Vector' ? 'fa-shield-alt' : (char.type === 'Paradox' ? 'fa-brain' : 'fa-bolt')}"></i> ${char.type} · NÍVEL 1</span>
      </div>
      <div class="card-body">
        <div class="stat-row">
          <div class="stat-box">
            <div class="stat-label">💪 FORÇA (Might)</div>
            <input type="number" class="stat-input" id="mightVal" value="${char.might}" step="1"> / ${char.maxMight}
          </div>
          <div class="stat-box">
            <div class="stat-label">⚡ DESTREZA (Speed)</div>
            <input type="number" class="stat-input" id="speedVal" value="${char.speed}" step="1"> / ${char.maxSpeed}
          </div>
          <div class="stat-box">
            <div class="stat-label">🧠 INTELECTO (Intellect)</div>
            <input type="number" class="stat-input" id="intellectVal" value="${char.intellect}" step="1"> / ${char.maxIntellect}
          </div>
        </div>
        
        <div class="pool-section">
          <div class="pool">
            <div class="stat-label"><i class="fas fa-bolt"></i> ESFORÇO (Effort)</div>
            <input type="number" class="pool-input" id="effortVal" value="${char.effort}" min="0" max="3" step="1">
          </div>
          <div class="pool">
            <div class="stat-label"><i class="fas fa-star"></i> EXPERIÊNCIA (XP)</div>
            <input type="number" class="pool-input" id="xpVal" value="${char.xp}" min="0" step="1">
          </div>
        </div>

        <div class="focus-area">
          <div class="focus-row">
            <input type="text" id="descriptorVal" class="focus-input" value="${escapeHtml(char.descriptor)}" placeholder="Descritor">
            <input type="text" id="focusVal" class="focus-input" value="${escapeHtml(char.focus)}" placeholder="Foco">
          </div>
        </div>

        <div class="section-title"><i class="fas fa-dice-d6"></i> HABILIDADES ESPECIAIS</div>
        <textarea id="abilitiesVal" rows="2">${escapeHtml(char.abilities)}</textarea>

        <div class="section-title"><i class="fas fa-toolbox"></i> EQUIPAMENTOS</div>
        <textarea id="equipmentVal" rows="2">${escapeHtml(char.equipment)}</textarea>

        <div class="section-title"><i class="fas fa-chart-line"></i> PERÍCIAS TREINADAS</div>
        <textarea id="skillsVal" rows="2">${escapeHtml(char.skills)}</textarea>

        <div class="button-group">
          <button class="btn-reset" id="resetBtn"><i class="fas fa-undo-alt"></i> Restaurar original</button>
          <button class="btn-reset btn-save" id="saveBtn"><i class="fas fa-save"></i> Salvar</button>
        </div>
      </div>
    `;

    attachEvents(char);
    document.getElementById('personagemInfo').innerHTML = `<i class="fas fa-user"></i> ${char.name} · ${char.type} · ID ${char.id}`;
    document.getElementById('currentIdDisplay').innerText = `Personagem ${char.id}`;
    renderCypherInventory();
  }

  function attachEvents(char) {
    const nameInput = document.getElementById('charName');
    const mightInput = document.getElementById('mightVal');
    const speedInput = document.getElementById('speedVal');
    const intInput = document.getElementById('intellectVal');
    const effortInput = document.getElementById('effortVal');
    const xpInput = document.getElementById('xpVal');
    const descriptorInput = document.getElementById('descriptorVal');
    const focusInput = document.getElementById('focusVal');
    const abilitiesTA = document.getElementById('abilitiesVal');
    const equipmentTA = document.getElementById('equipmentVal');
    const skillsTA = document.getElementById('skillsVal');

    function syncChar() {
      char.name = nameInput.value;
      char.descriptor = descriptorInput.value;
      char.focus = focusInput.value;
      char.abilities = abilitiesTA.value;
      char.equipment = equipmentTA.value;
      char.skills = skillsTA.value;
      
      let newMight = parseInt(mightInput.value);
      if (!isNaN(newMight) && newMight >= 0 && newMight <= char.maxMight) char.might = newMight;
      else mightInput.value = char.might;
      
      let newSpeed = parseInt(speedInput.value);
      if (!isNaN(newSpeed) && newSpeed >= 0 && newSpeed <= char.maxSpeed) char.speed = newSpeed;
      else speedInput.value = char.speed;
      
      let newInt = parseInt(intInput.value);
      if (!isNaN(newInt) && newInt >= 0 && newInt <= char.maxIntellect) char.intellect = newInt;
      else intInput.value = char.intellect;
      
      let newEffort = parseInt(effortInput.value);
      if (!isNaN(newEffort) && newEffort >= 0) char.effort = newEffort;
      else effortInput.value = char.effort;
      
      let newXp = parseInt(xpInput.value);
      if (!isNaN(newXp)) char.xp = newXp;
      else xpInput.value = char.xp;
      
      saveToStorage(char);
      document.getElementById('personagemInfo').innerHTML = `<i class="fas fa-user"></i> ${char.name} · ${char.type} · ID ${char.id}`;
    }

    const inputs = [nameInput, mightInput, speedInput, intInput, effortInput, xpInput, descriptorInput, focusInput, abilitiesTA, equipmentTA, skillsTA];
    inputs.forEach(inp => {
      if (inp) inp.addEventListener('change', syncChar);
      if (inp && inp.tagName !== 'TEXTAREA') inp.addEventListener('input', syncChar);
    });
    
    const resetBtn = document.getElementById('resetBtn');
    const originalChar = personagens.find(p => p.id === char.id);
    if (resetBtn) {
      resetBtn.onclick = () => {
        char.name = originalChar.name;
        char.descriptor = originalChar.descriptor;
        char.focus = originalChar.focus;
        char.might = originalChar.maxMight;
        char.speed = originalChar.maxSpeed;
        char.intellect = originalChar.maxIntellect;
        char.effort = 1;
        char.xp = 0;
        char.abilities = originalChar.abilities;
        char.equipment = originalChar.equipment;
        char.skills = originalChar.skills;
        char.cyphers = [];
        saveToStorage(char);
        renderFicha();
        updateCypherDisplay();
      };
    }
    
    const saveBtn = document.getElementById('saveBtn');
    if (saveBtn) {
      saveBtn.onclick = () => {
        syncChar();
        alert(`Personagem ${char.name} salvo!`);
      };
    }
  }

  function initFromUrl() {
    const params = new URLSearchParams(window.location.search);
    let paramId = params.get('personagem');
    if (paramId) {
      let idNum = parseInt(paramId);
      if (!isNaN(idNum) && idNum >= 1 && idNum <= 6) {
        currentCharId = idNum;
      }
    }
    loadFromStorage();
    renderFicha();
    generateNewCypher();
    
    const generateBtn = document.getElementById('generateCypherBtn');
    if (generateBtn) {
      generateBtn.onclick = () => generateNewCypher();
    }
  }

  initFromUrl();
</script>
</body>
</html>
